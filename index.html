<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Labor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .warning-box {
            background-color: #e74c3c;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            max-width: 600px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }
        h1 {
            margin-top: 0;
        }
        .login {
            background-color: white;
            color: black;
            padding: 20px;
            border-radius: 5px;
            text-align: left;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        header {
            background-color: #666;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }
    </style>

</head>
<body>
    <header>
        <h2>Social Media Labor</h2>
    </header>

    <div class="login">
        <button>Lehrkräfte-Login</button>
    </div>

    <div class="login">
        <div id="login-container">
            <h1>Willkommen im Social Media Labor</h1>
            <p>Bitte gib deinen Session-Code ein, um zu starten.</p>

            <!-- Das Eingabefeld -->
            <input type="text" id="sessionCodeInput" placeholder="Z.B. A7F3-X9">

            <!-- Der Button, der das JavaScript auslöst -->
            <button id="joinButton">Labor betreten</button>

            <!-- Bereich für Fehlermeldungen (zunächst unsichtbar) -->
            <p id="errorMessage" style="color: red; display: none;">Falscher Code, bitte nochmal versuchen.</p>
        </div>

        <!-- Hier binden wir das JavaScript ein -->
        <script src="login.js"></script>
    </div>

</body>
</html>
