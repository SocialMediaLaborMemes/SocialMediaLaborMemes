name: Supabase Keep Alive

on:
  schedule:
    # Führt den Ping alle 3 Tage um Mitternacht aus
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Ermöglicht manuelles Ausführen zum Testen

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/sessions?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"