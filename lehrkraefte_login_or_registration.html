<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Login & Registrierung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        #btnLogin {
            background-color: #3b82f6;
        }

        #btnRegister {
            background-color: #10b981;
        }

        #btnLogout {
            background-color: #ef4444;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        /* Versteckt Elemente standardmäßig */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <!-- Bereich für Login und Registrierung -->
        <div id="auth-section">
            <h2>Login / Registrierung</h2>
            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" placeholder="beispiel@mail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" placeholder="Min. 6 Zeichen" required>
            </div>
            <button id="btnLogin">Einloggen</button>
            <button id="btnRegister">Registrieren</button>
        </div>
        <!-- Nachrichten (Fehler/Erfolg) -->
        <div id="message"></div>
    </div>

    <!-- Einbinden der JavaScript-Datei (als Modul, wegen Supabase) -->
    <script type="module" src="registration_or_login.js"></script>
</body>
</html>
